name: Deploy Burnthday

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "20 14 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Blogger setlists
        run: npm run import:blogger
        continue-on-error: true

      - name: Import official setlists
        run: npm run import:official-setlists -- --year 2026
        continue-on-error: true

      - name: Build site
        run: npm run build
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name burnthday --branch main --commit-dirty=true
